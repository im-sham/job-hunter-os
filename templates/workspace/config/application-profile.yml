version: 1

contact:
  email: you@example.com
  phone: ''
  linkedin_url: ''
  portfolio_url: ''

safe_answers:
  current_city: Fill in your home city.
  current_country: Fill in your home country.
  github_url: Fill in your GitHub profile if you use one.
  relocation: Fill in your default relocation answer.
  work_mode_preference: Fill in your default work mode answer.
  start_date: Fill in a safe default for start-date questions.
